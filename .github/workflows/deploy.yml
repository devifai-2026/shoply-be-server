name: deploy

# Auto-deploy the backend to the GCP VM on every push to main.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ship source to VM (tar over SSH)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/**,package.json,package-lock.json,.env.example"
          target: "/tmp/server-deploy"

      - name: Install, seed, restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -e
            rsync -a --delete --exclude node_modules --exclude uploads --exclude .env \
              /tmp/server-deploy/ /opt/ecom/server/
            cd /opt/ecom/server
            npm ci --omit=dev
            set -a && . /etc/ecom-server.env && set +a
            node src/seed-owner.js || true
            sudo systemctl restart ecom-server
            sleep 4
            curl -fsS http://localhost:5000/health
